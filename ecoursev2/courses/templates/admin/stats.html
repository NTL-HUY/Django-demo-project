{% extends 'admin/base_site.html' %}

{% block content %}

<h1>STATICS INFOMATION COURSE</h1>
<ul>
    {% for c in stats %}
    <li>{{c.name}} has {{c.count}} courses</li>
    {% endfor %}
</ul>

<div>
    <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    window.onload = function () {
        const ctx = document.getElementById('myChart');
        let labels = []
        let data = []
        {% for c in stats %}
        labels.push('{{c.name}}')
        data.push('{{c.count}}')
        {% endfor %}
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '# of Votes',
                    data: data,
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }
</script>

{% endblock %}
